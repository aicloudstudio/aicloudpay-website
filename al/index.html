<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8" />
  <title>AI Cloud Studio — Zhvillim Modern i Faqeve Web</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    /* ——— Dizajni identik me EN/DE ——— */
    :root {
      --bg: #050509;
      --bg-soft: #0b0b12;
      --card: #11111a;
      --accent: #4f46e5;
      --accent-soft: rgba(79, 70, 229, 0.12);
      --text: #f9fafb;
      --muted: #9ca3af;
      --border: #1f2933;
      --shadow-soft: 0 18px 45px rgba(0, 0, 0, 0.55);
      --radius-lg: 18px;
      --radius-xl: 26px;
      --transition: 200ms ease-out;
      --max-width: 1120px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
      background: radial-gradient(circle at top, #111827 0, #020617 55%);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      scroll-behavior: smooth;
    }
    a { text-decoration: none; color: inherit; }
    img { max-width: 100%; display: block; }
    .page { min-height: 100vh; display: flex; flex-direction: column; }
    .container { max-width: var(--max-width); margin: 0 auto; padding: 0 1.5rem; }

    /* NAVBAR */
    header {
      position: sticky; top: 0; z-index: 40;
      backdrop-filter: blur(18px);
      background: rgba(2,6,23,0.9);
      border-bottom: 1px solid rgba(148,163,184,0.12);
    }
    .nav { display: flex; justify-content: space-between; align-items: center; padding: 0.9rem 0; }
    .nav-left { display: flex; align-items: center; gap: 0.75rem; }
    .logo-mark {
      width: 32px; height: 32px; border-radius: 12px;
      background: radial-gradient(circle at 20% 0, #4f46e5, #0ea5e9);
      display: flex; align-items: center; justify-content: center;
      font-weight: 600; font-size: 0.9rem;
    }
    .logo-text { display: flex; flex-direction: column; }
    .logo-text span:first-child { font-weight: 600; font-size: 0.9rem; }
    .logo-text span:last-child { font-size: 0.75rem; color: var(--muted); }

    .nav-links { display: flex; gap: 1.5rem; color: var(--muted); }
    .nav-links a:hover { color: #fff; }

    .nav-right { display: flex; align-items: center; gap: 1rem; }

    .lang-switcher {
      display: flex; align-items: center; gap: 0.35rem;
      padding: 0.25rem 0.6rem;
      border-radius: 999px;
      background: rgba(15,23,42,0.85);
      border: 1px solid rgba(148,163,184,0.35);
    }
    .lang-flag {
      width: 20px; height: 14px; border-radius: 3px; overflow: hidden;
      border: 1px solid rgba(15,23,42,0.9);
    }
    .lang-flag img { width: 100%; height: 100%; }

    .lang-links { display: flex; gap: 0.25rem; font-size: 0.75rem; }
    .lang-links a.active {
      background: rgba(79,70,229,0.16);
      border: 1px solid rgba(79,70,229,0.7);
      color: #fff;
      border-radius: 999px;
      padding: 0.1rem 0.4rem;
    }

    .nav-cta {
      padding: 0.45rem 0.95rem;
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,0.5);
      background: rgba(15,23,42,0.9);
      color: #fff;
      font-size: 0.8rem;
    }

    /* HERO */
    main { flex: 1; }
    .section { padding: 3.5rem 0; }
    .hero-grid {
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 2.5rem;
      align-items: center;
    }
    .eyebrow {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.18rem 0.6rem;
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,0.4);
      background: rgba(15,23,42,0.9);
      font-size: 0.7rem;
      color: var(--muted);
      margin-bottom: 1.1rem;
    }
    .eyebrow-dot {
      width: 6px; height: 6px; border-radius: 999px;
      background: #22c55e;
    }
    h1 {
      font-size: clamp(2.4rem, 4vw, 3.1rem);
      line-height: 1.05;
      margin-bottom: 1rem;
    }
    h1 span {
      background: linear-gradient(to right, #e5e7eb, #9ca3af);
      -webkit-background-clip: text;
      color: transparent;
    }
    .hero p {
      color: var(--muted);
      font-size: 0.98rem;
      max-width: 32rem;
      line-height: 1.6;
      margin-bottom: 1.6rem;
    }
    .hero-actions { display: flex; gap: 0.75rem; margin-bottom: 1.4rem; }
    .btn-primary {
      padding: 0.7rem 1.4rem;
      border-radius: 999px;
      background: linear-gradient(135deg, #4f46e5, #0ea5e9);
      color: #fff;
      font-weight: 500;
    }
    .btn-ghost {
      padding: 0.7rem 1.1rem;
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,0.5);
      background: rgba(15,23,42,0.9);
      color: #fff;
    }
    .hero-meta { display: flex; gap: 1.5rem; font-size: 0.78rem; color: var(--muted); }

    /* WHY US */
    .section-header { margin-bottom: 1.8rem; }
    .section-header h2 { font-size: 1.4rem; }
    .section-header p { color: var(--muted); max-width: 26rem; }

    .why-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.2rem;
    }
    .why-card {
      background: rgba(15,23,42,0.96);
      border: 1px solid rgba(148,163,184,0.25);
      padding: 1.1rem;
      border-radius: var(--radius-lg);
      color: var(--muted);
    }
    .why-card h3 { color: #fff; margin-bottom: 0.4rem; }

    /* PACKAGES */
    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.2rem;
    }
    .card {
      background: rgba(15,23,42,0.96);
      border: 1px solid rgba(148,163,184,0.25);
      padding: 1.2rem;
      border-radius: var(--radius-lg);
      color: var(--muted);
    }
    .card h3 { color: #fff; margin-bottom: 0.4rem; }
    .card-price { margin-top: 0.4rem; font-size: 1.1rem; color: #fff; font-weight: 600; }
    .card-tag {
      background: rgba(79,70,229,0.16);
      border: 1px solid rgba(79,70,229,0.7);
      color: #c7d2fe;
      padding: 0.18rem 0.55rem;
      border-radius: 999px;
      font-size: 0.7rem;
    }

    /* PORTFOLIO */
    .portfolio-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.2rem;
    }
    .portfolio-card {
      background: rgba(15,23,42,0.96);
      border: 1px solid rgba(148,163,184,0.25);
      padding: 1rem;
      border-radius: var(--radius-lg);
      color: var(--muted);
    }
    .portfolio-card h3 { color: #fff; margin-bottom: 0.3rem; }
    .portfolio-pill {
      background: rgba(15,23,42,0.9);
      border: 1px solid rgba(148,163,184,0.4);
      padding: 0.18rem 0.55rem;
      border-radius: 999px;
      font-size: 0.7rem;
      margin-bottom: 0.4rem;
    }

    /* FAQ */
    .faq-list {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
    }
    .faq-item {
      background: rgba(15,23,42,0.96);
      border: 1px solid rgba(148,163,184,0.25);
      padding: 0.9rem;
      border-radius: var(--radius-lg);
      color: var(--muted);
    }
    .faq-item h3 { color: #fff; margin-bottom: 0.25rem; }

    /* CONTACT */
    .contact-grid {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 1.8rem;
    }
    .contact-card {
      background: rgba(15,23,42,0.96);
      border: 1px solid rgba(148,163,184,0.25);
      padding: 1.4rem;
      border-radius: var(--radius-xl);
      color: var(--muted);
    }
    .contact-card h3 { color: #fff; margin-bottom: 0.4rem; }

    /* FOOTER */
    footer {
      border-top: 1px solid rgba(148,163,184,0.2);
      padding: 1.4rem 0;
      margin-top: 2rem;
      text-align: center;
      color: var(--muted);
    }
  </style>
</head>

<body>
  <div class="page">

    <!-- NAVBAR -->
    <header>
      <div class="container">
        <nav class="nav">
          <div class="nav-left">
            <div class="logo-mark">AI</div>
            <div class="logo-text">
              <span>AI Cloud Studio</span>
              <span>Zhvillim Modern Web</span>
            </div>
          </div>

          <div class="nav-links">
            <a href="#packages">Paketat</a>
            <a href="#portfolio">Portfolio</a>
            <a href="#faq">FAQ</a>
            <a href="#contact">Kontakt</a>
          </div>

          <div class="nav-right">
            <div class="lang-switcher">
              <div class="lang-flag">
                <img src="/flags/al.svg" alt="Shqip" />
              </div>
              <div class="lang-links">
                <a href="/">EN</a>
                <a href="/de/">DE</a>
