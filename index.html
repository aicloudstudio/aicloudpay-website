<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Cloud Studio — Modern Web Development</title>
    <meta name="description" content="AI Cloud Studio builds clean, fast and professional websites using modern design and AI-powered workflows.">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Inter", system-ui, sans-serif;
        }

        body {
            background: linear-gradient(to bottom, #f7f7f7, #ffffff);
            color: #111;
            line-height: 1.6;
        }

        /* Smooth fade-in animation */
        .fade-in {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 0.8s ease forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Navigation */
        nav {
            width: 100%;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #eee;
            z-index: 10;
        }

        nav .logo {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.4px;
        }

        .nav-links {
            display: flex;
            gap: 24px;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: #111;
            font-size: 15px;
        }

        nav a.cta {
            padding: 9px 18px;
            border-radius: 999px;
            background: #111;
            color: #fff;
            text-decoration: none;
            font-size: 14px;
        }

            margin-bottom: 18px;
            letter-spacing: -0.5px;
        }

            font-size: 19px;
            color: #555;
            margin-bottom: 32px;
